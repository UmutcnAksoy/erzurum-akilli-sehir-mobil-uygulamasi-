name: erzurum_akilli_sehir_uygulamasi
description: Erzurum Akıllı Şehir Rehberi Uygulaması

publish_to: 'none'

version: 1.0.0+1

environment:
  # Minimum SDK 3.0.0'a geri çekildi (Çakışma riskini azaltmak için)
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend ve Veri Tabanı (Yaygın Uyumlu Versiyonlar)
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  
  # Yardımcı Paketler
  http: ^1.2.0 
  intl: ^0.19.0 
  url_launcher: ^6.2.4

  # UI, İkonlar ve Fontlar (Uyumlu Versiyonlar)
  cupertino_icons: ^1.0.8
  flex_color_scheme: ^8.2.0 # Senin son gönderdiğin versiyonu koruduk
  google_fonts: ^6.3.2
  lucide_icons: ^0.257.0 # Senin son gönderdiğin versiyonu koruduk
  
  # Medya Oynatıcı
  youtube_player_flutter: ^9.1.3 # Senin son gönderdiğin versiyonu koruduk

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0 # Senin son gönderdiğin versiyonu koruduk

flutter:
  uses-material-design: true

  # Assetler (Görseller)
  assets:
    # Ana arka plan görseli
    - assets/images/background.jpg
    # KRİTİK: Üniversite logoları ve diğer görseller için klasörü tamamen ekliyoruz
    - assets/images/